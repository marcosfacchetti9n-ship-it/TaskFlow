spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/codex_test}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:a}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:true}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

application:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080}
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:VGhpc0lzQVNlY3VyZVNlY3JldEtleUZvckpXVEF1dGhFbmNvZGluZzEyMzQ1Njc4OTA=}
      expiration: ${JWT_EXPIRATION:86400000}
